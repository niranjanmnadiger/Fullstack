<!DOCTYPE html>
<html>

<body>
    <div id="posts"></div>
    <script>
        async function fetchPosts() {
            const res = await fetch("https://jsonplaceholder.typicode.com/posts/1", {
                method: "GET"
            });

            const json = await res.json();  // getting the response from json file to a variable named json

            document.getElementById("posts").innerHTML = json.title; //json is the variable which has the object {} - json.title will fetch you only the title


        }

        fetchPosts();
    </script>
</body>

</html>
